version: '3.8'

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/ros2_ws/src/livox_ros_driver2:cached
    networks:
      default: {}
      livox_net:
        ipv4_address: 192.168.1.10
    command: sleep infinity

networks:
  livox_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1
